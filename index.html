<!DOCTYPE html>
<html>
<head>
<title>Notificación Importante</title>

<style>

body{
font-family: Arial, sans-serif;
text-align:center;
margin-top:60px;
background:#f4f4f4;
}

#console{
margin-top:40px;
background:black;
color:#00ff00;
padding:20px;
width:65%;
height:260px;
overflow-y:auto;
margin-left:auto;
margin-right:auto;
font-family:monospace;
text-align:left;
border-radius:5px;
}

.progressBar{
width:100%;
background:#333;
height:20px;
margin-top:10px;
}

.progress{
height:20px;
width:0%;
background:#00ff00;
}

.cmdBox{
position:fixed;
width:300px;
height:170px;
background:black;
color:#00ff00;
font-family:monospace;
padding:10px;
border:2px solid #333;
box-shadow:0px 0px 10px rgba(0,0,0,0.6);
}

#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

#modalContent{
background:white;
padding:30px;
border-radius:10px;
width:420px;
text-align:center;
}

#modalContent h2{
color:red;
}

#cerrar{
margin-top:20px;
padding:10px 20px;
cursor:pointer;
}

</style>

</head>

<body onload="iniciar()">

<h2>Notificación de Seguridad</h2>
<p>Procesando solicitud...</p>

<div id="console"></div>

<div id="modal">
<div id="modalContent">

<h2>⚠️ SIMULACIÓN FINALIZADA</h2>

<p>
Esta fue una simulación educativa.<br><br>
Así puede verse la ejecución de un enlace malicioso.<br>
Nunca hagas clic en enlaces sospechosos.
</p>

<button id="cerrar" onclick="cerrarModal()">Cerrar</button>

</div>
</div>

<script>

let consola = document.getElementById("console")

function escribir(texto, delay=40){

return new Promise(resolve=>{

let i=0

let intervalo=setInterval(()=>{

consola.innerHTML += texto.charAt(i)
i++

consola.scrollTop = consola.scrollHeight

if(i>=texto.length){
clearInterval(intervalo)
consola.innerHTML += "<br>"
resolve()
}

},delay)

})

}

async function iniciar(){

await escribir("Resolviendo host remoto...")
await escribir("IP detectada: 172.16.9.12")
await escribir("Estableciendo conexión segura...")
await escribir("Conectando al servidor 172.16.9.12")

await escribir("Iniciando transferencia de paquete")

barraProgreso()

setTimeout(()=>{
abrirVentanasCMD()
},6000)

}

function barraProgreso(){

let barra = document.createElement("div")
barra.className="progressBar"

let progreso = document.createElement("div")
progreso.className="progress"

barra.appendChild(progreso)

consola.appendChild(barra)

let porcentaje = 0

let intervalo = setInterval(()=>{

porcentaje += 5

progreso.style.width = porcentaje+"%"

if(porcentaje >=100){

clearInterval(intervalo)

consola.innerHTML += "<br>Descarga completada.<br>"
consola.innerHTML += "Ejecutando archivo remoto...<br>"

}

},200)

}

function abrirVentanasCMD(){

for(let i=0;i<15;i++){

setTimeout(()=>{

let box = document.createElement("div")

box.className="cmdBox"

box.style.left = Math.random()*80 + "%"

box.style.top = Math.random()*70 + "%"

box.innerHTML =
"Microsoft Windows [Versión 10.0]<br>"+
"(c) Microsoft Corporation<br><br>"+
"C:\\Windows\\System32><br>"+
"ejecutando_proceso.exe<br>"+
"Proceso duplicado...<br>"+
"Proceso duplicado...<br>"

document.body.appendChild(box)

}, i*200)

}

setTimeout(()=>{

document.getElementById("modal").style.display="flex"

},4000)

}

function cerrarModal(){
document.getElementById("modal").style.display="none"
}

</script>

</body>
</html>
