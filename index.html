<!DOCTYPE html>
<html>
<head>
<title>Notificación Importante</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
margin-top:80px;
}

#console{
background:black;
color:#00ff00;
font-family:monospace;
width:65%;
height:320px;
margin:auto;
padding:20px;
overflow-y:auto;
display:none;
text-align:left;
}

.progress{
width:100%;
background:#333;
margin-top:10px;
}

.progress-bar{
width:0%;
height:20px;
background:#00ff00;
}

.cmdBox{
position:fixed;
background:black;
color:#00ff00;
font-family:monospace;
padding:10px;
width:260px;
height:120px;
border:2px solid #333;
}

#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:9999;
}

#modalContent{
background:white;
padding:30px;
border-radius:10px;
width:400px;
text-align:center;
}

#modalContent h2{
color:red;
}

#cerrar{
margin-top:20px;
padding:10px 20px;
cursor:pointer;
}

</style>
</head>


<body onload="iniciar()">

<h2>Notificación de Seguridad</h2>
<p>Procesando solicitud...</p>

<div id="console"></div>

<div id="modal">
<div id="modalContent">

<h2>⚠️ SIMULACIÓN FINALIZADA</h2>

<p>
Esta fue una simulación educativa.<br><br>
Así puede verse la ejecución de un enlace malicioso.<br><br>
Nunca hagas clic en enlaces sospechosos.
</p>

<button id="cerrar" onclick="cerrarModal()">Cerrar</button>

</div>
</div>


<script>

function escribir(texto,delay){
setTimeout(()=>{
let consola=document.getElementById("console")
consola.innerHTML+=texto+"<br>"
consola.scrollTop=consola.scrollHeight
},delay)
}


function iniciar(){

let consola=document.getElementById("console")
consola.style.display="block"

escribir("Resolviendo host remoto...",500)
escribir("IP detectada: 172.16.9.12",1200)
escribir("Estableciendo conexión con 172.16.9.12...",2000)
escribir("Conexión establecida.",3000)
escribir("Inicializando transferencia segura...",3800)
escribir("Descargando paquete remoto...",4500)

setTimeout(crearBarra,5200)

}


function crearBarra(){

let consola=document.getElementById("console")

consola.innerHTML+=`

<div class="progress">
<div class="progress-bar" id="barra"></div>
</div>

`

let progreso=0

let intervalo=setInterval(()=>{

progreso+=2

document.getElementById("barra").style.width=progreso+"%"

if(progreso>=100){

clearInterval(intervalo)

let consola=document.getElementById("console")

consola.innerHTML+="<br>Descarga completada.<br>"
consola.innerHTML+="Ejecutando archivo remoto...<br>"
consola.innerHTML+="cmd.exe iniciado...<br>"

setTimeout(abrirVentanasCMD,1200)

}

},60)

}


function abrirVentanasCMD(){

let totalVentanas=10

for(let i=0;i<totalVentanas;i++){

setTimeout(()=>{

let ventana=document.createElement("div")

ventana.className="cmdBox"

ventana.style.left=Math.random()*80+"%"
ventana.style.top=Math.random()*70+"%"

ventana.innerHTML=`
C:\\Windows\\System32><br>
Proceso duplicado...<br>
Escaneando sistema...<br>
Acceso remoto establecido
`

document.body.appendChild(ventana)

},i*200)

}

setTimeout(cancelarSimulacion,4000)

}


function cancelarSimulacion(){

// eliminar ventanas cmd

document.querySelectorAll(".cmdBox").forEach(v=>{
v.remove()
})

// mostrar mensaje final

document.getElementById("modal").style.display="flex"

}


function cerrarModal(){

document.getElementById("modal").style.display="none"

}

</script>

</body>
</html>
