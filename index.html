<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Conectando...</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.contenedor{
    background:white;
    padding:40px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

#estado{
    font-size:20px;
    margin-top:20px;
}

.alerta{
    position:fixed;
    top:20px;
    right:20px;
    background:#ffffff;
    border-left:5px solid #ff4d4d;
    padding:15px;
    margin-top:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    border-radius:5px;
    width:250px;
    animation: aparecer 0.5s ease;
}

@keyframes aparecer{
    from{opacity:0; transform:translateX(50px);}
    to{opacity:1; transform:translateX(0);}
}
</style>
</head>

<body>

<div class="contenedor">

<h2>Iniciando conexión...</h2>

<p id="estado">Conectando al servidor...</p>

</div>

<script>

function mostrarAlerta(texto){

    let alerta = document.createElement("div");
    alerta.className = "alerta";
    alerta.innerText = texto;

    document.body.appendChild(alerta);

    setTimeout(()=>{
        alerta.remove();
    },4000);

}

setTimeout(()=>{
    mostrarAlerta("⚠ Conexión no segura detectada");
},2000);

setTimeout(()=>{
    mostrarAlerta("⚠ Verificando servidor...");
},4000);

setTimeout(()=>{
    mostrarAlerta("⚠ Redirigiendo...");
},6000);

</script>

</body>
</html>
