<!DOCTYPE html>
<html>
<head>
    <title>Notificación Importante</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 80px;
            background-color: #f4f4f4;
        }

        #console{
            margin-top: 40px;
            background: black;
            color: #00ff00;
            padding: 20px;
            width: 60%;
            height: 300px;
            overflow-y: auto;
            margin-left: auto;
            margin-right: auto;
            display: none;
            font-family: monospace;
            text-align: left;
        }

        #modal{
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }

        #modalContent{
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            text-align: center;
        }

        #modalContent h2{
            color: red;
        }

        #cerrar{
            margin-top: 20px;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>

<body onload="iniciar()">

<h2>Notificación de Seguridad</h2>
<p>Procesando solicitud...</p>

<div id="console"></div>

<div id="modal">
    <div id="modalContent">
        <h2>⚠️ SIMULACIÓN FINALIZADA</h2>
        <p>
            Esta fue una simulación educativa.<br><br>
            Así puede verse la ejecución de un enlace malicioso.
            Nunca hagas clic en enlaces sospechosos.
        </p>
        <button id="cerrar" onclick="cerrarModal()">Cerrar</button>
    </div>
</div>

<script>
function iniciar(){
    let consola = document.getElementById("console");
    consola.style.display = "block";
    consola.innerHTML = "Resolviendo host remoto...\n";

    setTimeout(()=>{
        consola.innerHTML += "IP detectada: 172.16.9.12\n";
    },1000);

    setTimeout(()=>{
        consola.innerHTML += "Estableciendo conexión con 172.16.9.12...\n";
    },2000);

    setTimeout(()=>{
        consola.innerHTML += "Conexión establecida.\n";
        consola.innerHTML += "Descargando paquete remoto...\n";
    },3000);

    setTimeout(()=>{
        consola.innerHTML += "Descarga completada.\n";
        consola.innerHTML += "Ejecutando archivo...\n";
        consola.innerHTML += "cmd.exe iniciado...\n";
    },4500);

    setTimeout(()=>{
        let intervalo = setInterval(()=>{
            consola.innerHTML += "Proceso duplicado...\n";
            consola.scrollTop = consola.scrollHeight;
        },100);

        setTimeout(()=>{
            clearInterval(intervalo);
            document.getElementById("modal").style.display = "flex";
        },10000);

    },5500);
}

function cerrarModal(){
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
